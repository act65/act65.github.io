# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1.6     # Updated Ruby version
          bundler-cache: true
          cache-version: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Notify IndexNow-participating search engines (Bing, Yandex, Seznam, ...)
  # that content changed, so they recrawl without waiting for a scheduled crawl.
  # Google does NOT use IndexNow — it relies on the sitemap submitted in Search Console.
  indexnow:
    runs-on: ubuntu-22.04
    needs: deploy
    steps:
      - name: Submit URLs to IndexNow
        run: |
          set -euo pipefail
          HOST="act65.github.io"
          KEY="224b6197a0a3c71a18fc361fc2e0e99c"
          # Give the new deploy a moment to go live so the key file and URLs resolve.
          sleep 20
          URLS=$(curl -sf "https://${HOST}/sitemap.xml" | grep -oP '(?<=<loc>)[^<]+')
          COUNT=$(printf '%s\n' "$URLS" | grep -c . || true)
          echo "Submitting ${COUNT} URLs to IndexNow"
          BODY=$(printf '%s\n' "$URLS" | jq -R . | jq -s \
            --arg host "$HOST" --arg key "$KEY" \
            '{host: $host, key: $key, keyLocation: ("https://" + $host + "/" + $key + ".txt"), urlList: .}')
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY" -o /dev/null -w "IndexNow responded HTTP %{http_code}\n"
